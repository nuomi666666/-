<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機抽籤輪盤</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: #fdfdfd;
            /* 移除 overflow: hidden，讓畫面太小時可以往下滾動 */
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* 頂部黑框外層，用來產生左右留白 */
        .top-bar-wrapper {
            width: 100%;
            padding-top: 10px;
        }

        /* 頂部黑框導覽列 */
        .top-bar {
            background-color: #383c44;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: #a0a0a0;
            font-size: 14px;
            width: 95%; /* 左右兩側留白 */
            max-width: 1400px;
            margin: 0 auto; /* 讓黑框置中 */
        }

        .nav-links span {
            margin-right: 15px;
            cursor: pointer;
        }
        
        .nav-links span:first-child {
            color: #ffffff;
            font-weight: bold;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-btn, .fullscreen-btn {
            background: transparent;
            border: 1px solid #777;
            color: #ccc;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .close-btn:hover, .fullscreen-btn:hover {
            color: #fff;
            border-color: #fff;
        }

        /* 標題與彈窗的容器 (相對定位，用來對齊彈窗) */
        .title-container {
            position: relative;
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
            height: 40px; /* 固定高度讓彈窗能精準覆蓋 */
        }

        .title-container h1 {
            font-size: 32px;
            color: #222;
            font-weight: normal;
            line-height: 40px;
        }

        /* 結果彈出視窗 (絕對定位於標題容器的正上方) */
        #result-popup {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: #fce8b3;
            width: 450px;
            height: 48px; /* 稍微比標題高一點以完全遮擋 */
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #result-popup.show {
            opacity: 1;
            pointer-events: auto;
        }

        #result-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .popup-btn {
            background: white;
            border: 1px solid #aaa;
            color: #333;
            padding: 2px 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
        }

        .popup-btn:hover {
            background: #eee;
        }

        /* 輪盤主體與容器 */
        .wheel-wrapper {
            position: relative;
            /* 微調大小，避免在一般筆電螢幕被截斷 */
            width: 450px; 
            height: 450px;
            margin: 0 auto 30px auto;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1);
            cursor: pointer; /* 滑鼠移上去變成手指，提示可以點擊 */
        }

        /* 右側紅色指針 */
        .pointer {
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 30px solid red;
            z-index: 15;
        }

    </style>
</head>
<body>

    <div class="top-bar-wrapper">
        <div class="top-bar">
            <div class="nav-links">
                <span>輪盤</span>
                <span>骰子</span>
                <span>隨機數字</span>
                <span>硬幣</span>
                <span>隨機排序</span>
                <span>抽籤</span>
                <span>計時器</span>
                <span>時鐘</span>
                <span>計分板</span>
                <span>擲筊</span>
            </div>
            <div class="top-right">
                <button class="close-btn">✕</button>
                <button class="fullscreen-btn">全螢幕 ⓧ</button>
            </div>
        </div>
    </div>

    <!-- 標題與結果彈窗放在同一個容器內 -->
    <div class="title-container">
        <h1>隨機抽籤輪盤</h1>
        <div id="result-popup">
            <button class="popup-btn" id="close-btn">x</button>
            <span id="result-text"></span>
            <button class="popup-btn" id="hide-btn">s</button>
        </div>
    </div>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <!-- 現在直接點擊 canvas 就會觸發旋轉 -->
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <script>
        /* ==========================================
           【暗箱操作設定區】在這裡設定你想要的順序
           ========================================== */
        // 陣列內的數字代表每次按旋轉後「必定」抽中的項目。
        const riggedSequence = [53, 27, 8]; 
        
        let riggedIndex = 0; 

        /* ==========================================
           輪盤基本設定
           ========================================== */
        // 自動生成 1 到 53 的字串陣列
        let items = Array.from({length: 53}, (_, i) => (i + 1).toString());
        
        // 顏色配置
        const colors = ['#4285F4', '#F47B6B', '#90EE90', '#F5DEB3', '#DDA0DD', '#F5DEB3'];

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const resultPopup = document.getElementById("result-popup");
        const resultText = document.getElementById("result-text");
        const hideBtn = document.getElementById("hide-btn");
        const closeBtn = document.getElementById("close-btn");

        let currentRotation = 0;
        let isSpinning = false;
        let selectedItem = null;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (items.length === 0) return;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;
            const sliceAngle = (2 * Math.PI) / items.length;

            for (let i = 0; i < items.length; i++) {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                
                ctx.lineWidth = 1;
                ctx.strokeStyle = "#999";
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "black";
                ctx.font = "12px Arial";
                ctx.fillText(items[i], radius - 15, 0);
                ctx.restore();
            }
        }

        drawWheel();

        // 【修改點】將點擊事件綁定在整個 canvas 輪盤上
        canvas.addEventListener("click", () => {
            if (isSpinning || items.length === 0) return;
            isSpinning = true;
            resultPopup.classList.remove("show");

            let targetItem;
            
            if (riggedIndex < riggedSequence.length && items.includes(riggedSequence[riggedIndex].toString())) {
                targetItem = riggedSequence[riggedIndex].toString();
                riggedIndex++;
            } else {
                targetItem = items[Math.floor(Math.random() * items.length)];
                if (riggedIndex < riggedSequence.length) riggedIndex++; 
            }

            selectedItem = targetItem;
            const targetIndex = items.indexOf(targetItem);
            const sliceAngle = 360 / items.length;

            const offsetAngle = targetIndex * sliceAngle + sliceAngle / 2;
            const stopAngle = 360 - offsetAngle;

            const spins = 5 * 360;
            const finalRotation = currentRotation + spins + stopAngle - (currentRotation % 360);

            canvas.style.transform = `rotate(${finalRotation}deg)`;
            currentRotation = finalRotation;

            setTimeout(() => {
                isSpinning = false;
                showResult(selectedItem);
            }, 4000);
        });

        function showResult(item) {
            resultText.textContent = item;
            resultPopup.classList.add("show");
        }

        closeBtn.addEventListener("click", () => {
            resultPopup.classList.remove("show");
        });

        hideBtn.addEventListener("click", () => {
            resultText.textContent = `${selectedItem} 已被隱藏`;
            
            setTimeout(() => {
                items = items.filter(i => i !== selectedItem);
                resultPopup.classList.remove("show");

                canvas.style.transition = 'none';
                canvas.style.transform = `rotate(0deg)`;
                currentRotation = 0;
                
                drawWheel();

                setTimeout(() => {
                    canvas.style.transition = 'transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)';
                }, 50);

            }, 800); 
        });
    </script>
</body>
</html>
